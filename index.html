const SALARY_PAY_DAY=28;
function expectedSpentFraction(day){
  if(day<=10)return (day/10)*0.65;
  if(day<=20)return 0.65+((day-10)/10)*0.18;
  return Math.min(1,0.83+((day-20)/11)*0.17);
}

const ls={get:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
          set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}};
const todayISO=()=>new Date().toISOString().slice(0,10);
const monthOf=d=>d.slice(0,7);
const daysBetween=(a,b)=>Math.floor((new Date(b)-new Date(a))/(1000*60*60*24));

function makeFmt(lang){
  const locale=lang==='da'?'da-DK':'en-US';
  const currency=lang==='da'?'kr':'kr'; // Both use kr for now (Danish kroner)
  return n=>Math.abs(n).toLocaleString(locale,{maximumFractionDigits:0})+' '+currency;
}
function makeFmtSigned(lang){
  const f=makeFmt(lang);
  return n=>(n>=0?'+':'-')+f(n);
}
function makeDanishDate(lang){
  return iso=>{
    if(!iso)return '';
    const [y,m,d]=iso.split('-');
    if(lang==='en')return m+'/'+d+'/'+y.slice(2);
    return d+'/'+m+' '+y.slice(2);
  };
}
function makeRelTime(lang,t){
  return iso=>{
    if(!iso)return '';
    const d=daysBetween(iso,todayISO());
    if(lang==='en'){
      if(d<0)return 'in '+Math.abs(d)+' days';
      if(d===0)return 'today';
      if(d===1)return 'yesterday';
      if(d<7)return d+' days ago';
      if(d<30)return Math.floor(d/7)+' weeks ago';
      return Math.floor(d/30)+' months ago';
    }
    if(d<0)return 'om '+Math.abs(d)+' dage';
    if(d===0)return 'i dag';
    if(d===1)return 'i går';
    if(d<7)return d+' dage siden';
    if(d<30)return Math.floor(d/7)+' uger siden';
    return Math.floor(d/30)+' md siden';
  };
}
function makeMonthLabel(lang){
  const en=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const da=['Jan','Feb','Mar','Apr','Maj','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];
  return mid=>{
    const [y,mo]=mid.split('-');
    return (lang==='en'?en:da)[parseInt(mo)-1]+' '+y.slice(2);
  };
}
function makeMonthName(lang){
  const en=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const da=['januar','februar','marts','april','maj','juni','juli','august','september','oktober','november','december'];
  return mid=>(lang==='en'?en:da)[parseInt(mid.slice(5,7))-1]||'';
}

function autoCategoryWithLearned(desc,learnedMap){
  const d=desc.toLowerCase().trim();
  // Check learned mappings first (user corrections)
  for(const [pattern,cat] of Object.entries(learnedMap||{})){
    if(d.includes(pattern.toLowerCase()))return cat;
  }
  // Built-in keywords
  for(const [kws,cat] of KEYWORDS){
    if(kws.some(k=>d.includes(k)))return cat;
  }
  return null;
}

// Detect subscriptions: recurring transactions every 28-32 days with similar amount
function detectSubscriptions(txs){
  const groups={};
  txs.filter(t=>!INCOME_CATS.has(t.cat)&&!NEUTRAL_CATS.has(t.cat)).forEach(t=>{
    // Group by lowercased first 3 words of description, rounded amount
    const key=t.desc.toLowerCase().split(/\s+/).slice(0,3).join(' ')+'|'+Math.round(Math.abs(t.amount)/10)*10;
    if(!groups[key])groups[key]=[];
    groups[key].push(t);
  });
  const subs=[];
  for(const items of Object.values(groups)){
    if(items.length<2)continue;
    items.sort((a,b)=>a.date.localeCompare(b.date));
    // Check intervals between consecutive transactions
    let isRecurring=true;
    for(let i=1;i<items.length;i++){
      const gap=daysBetween(items[i-1].date,items[i].date);
      if(gap<25||gap>35){isRecurring=false;break;}
    }
    if(isRecurring&&items.length>=2){
      const avgAmount=items.reduce((s,t)=>s+Math.abs(t.amount),0)/items.length;
      subs.push({
        desc:items[items.length-1].desc,
        cat:items[items.length-1].cat,
        amount:Math.round(avgAmount),
        count:items.length,
        lastDate:items[items.length-1].date,
      });
    }
  }
  return subs.sort((a,b)=>b.amount-a.amount);
}
