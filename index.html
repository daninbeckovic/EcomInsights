<div id="root"></div>
<script>
const {useState,useEffect,useRef}=React;
const SALARY_PAY_DAY=28;
// Brugerens forbrugsmønster - generisk dansk-forbrug (kan justeres efter første måneds data):
// Dag 1-10 = 65% af månedens forbrug, dag 11-20 = 18%, dag 21-31 = 17%
function expectedSpentFraction(day){
  if(day<=10)return (day/10)*0.65;
  if(day<=20)return 0.65+((day-10)/10)*0.18;
  return Math.min(1,0.83+((day-20)/11)*0.17);
}

const HIST_CAT_MONTH={};

const INCOME_CATS=new Set(['Løn','Feriepenge','Udlæg refusion','Overskydende skat','MobilePay modtaget']);
const NEUTRAL_CATS=new Set(['Opsparing','Fra opsparing','Refusion modtaget']);
const INTERNAL_CATS=NEUTRAL_CATS; // backwards compatibility alias
const ALL_CATS=['Løn','Feriepenge','Udlæg refusion','Overskydende skat','MobilePay modtaget',
  'MobilePay sendt','Dagligvarer','Restauranter & café','Bar & natteliv','Shopping & tøj',
  'Bolig & indretning','Frisør & pleje','Benzin / bil','Transport','Rejse & fly',
  'Sport & fritid','Gaming','Streaming','Software abonnementer','Forsikring',
  'Offentlige afgifter','Underholdning & events','Spil & betting','Opsparing','Fra opsparing','Refusion modtaget','Andet'];
const EXP_CATS=ALL_CATS.filter(c=>!INCOME_CATS.has(c)&&!NEUTRAL_CATS.has(c));
const INC_CATS_LIST=ALL_CATS.filter(c=>INCOME_CATS.has(c));
const NEUTRAL_CATS_LIST=ALL_CATS.filter(c=>NEUTRAL_CATS.has(c));

const KEYWORDS=[
  [['netto','rema','føtex','foetex','meny','bilka','coop','superbrugsen','kvickly','lidl','sunds fdb'],'Dagligvarer'],
  [['mcdonalds','burger','pizza','kebab','sushi','cafe','café','restaurant','bao','7-eleven'],'Restauranter & café'],
  [['spotify','apple.com','netflix','disney','hbo','tv 2'],'Streaming'],
  [['openai','chatgpt','claude','geoguessr','adobe','figma','notion'],'Software abonnementer'],
  [['ok silkeborg','ok kvickly','ok galten','ok sunds','ok sb','q8','shell','circle k','uno-x'],'Benzin / bil'],
  [['ryanair','sas','norwegian','airbnb','booking','momondo','expedia'],'Rejse & fly'],
  [['lønoverf','løn '],'Løn'],
  [['feriepenge'],'Feriepenge'],
  [['overskydende skat'],'Overskydende skat'],
  [['vinted','primark','zalando','asos','h&m'],'Shopping & tøj'],
  [['jysk','ikea','imerco','silvan','bauhaus'],'Bolig & indretning'],
  [['playstation','steam','kinguin','xbox','epic games'],'Gaming'],
  [['rejsekort','dsb','easypark','taxi','uber','rejsebillet','parkering'],'Transport'],
  [['bowling','padel','fodbold','tennis','squash','smukcrew'],'Sport & fritid'],
  [['if skadeforsikring','tryg','topdanmark','alka','codan'],'Forsikring'],
  [['the duke','pinds','bryghus','sportspubben','den engelske','zanders'],'Bar & natteliv'],
  [['mobilepay'],'MobilePay sendt'],
  [['safeticket','ticketmaster','livenation','byfest'],'Underholdning & events'],
  [['bet365','danske spil'],'Spil & betting'],
  [['waxies','prime cuts','barbershop','frisør','humble barber','gainerhair'],'Frisør & pleje'],
];
function autoCategory(desc){
  const d=desc.toLowerCase();
  for(const [kws,cat] of KEYWORDS){if(kws.some(k=>d.includes(k)))return cat;}
  return null;
}

const fmt=n=>Math.abs(n).toLocaleString('da-DK',{maximumFractionDigits:0})+' kr';
const fmtS=n=>(n>=0?'+':'-')+fmt(n);
const ls={get:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
          set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}};
const todayISO=()=>new Date().toISOString().slice(0,10);
const monthOf=d=>d.slice(0,7);
const daysBetween=(a,b)=>Math.floor((new Date(b)-new Date(a))/(1000*60*60*24));
const danishDate=iso=>{const [y,m,d]=iso.split('-');return d+'/'+m+' '+y.slice(2);};
const relTime=iso=>{
  const d=daysBetween(iso,todayISO());
  if(d<0)return 'om '+Math.abs(d)+' dage';
  if(d===0)return 'i dag';
  if(d===1)return 'i går';
  if(d<7)return d+' dage siden';
  if(d<30)return Math.floor(d/7)+' uger siden';
  return Math.floor(d/30)+' md siden';
};

const THEMES={
  light:{bg:'#F7F6F2',card:'#FFFFFF',text:'#1C1C1A',muted:'#75746F',border:'#E6E4DC',
         green:'#1A7A48',red:'#C13A2C',amber:'#B45309',blue:'#1D6EA5',
         gbg:'#EDF7F2',rbg:'#FDF0EF',abg:'#FEF4E7',bbg:'#EEF4FA',
         headerBg:'#1C1C1A',headerMuted:'rgba(255,255,255,0.45)',inputBg:'#FFFFFF'},
  dark:{bg:'#16161A',card:'#1F1F23',text:'#F0EFEA',muted:'#9C9B95',border:'#2D2D32',
        green:'#34D399',red:'#F87171',amber:'#FBBF24',blue:'#60A5FA',
        gbg:'#0F2620',rbg:'#2A1614',abg:'#2A1F0F',bbg:'#0E1F30',
        headerBg:'#0A0A0C',headerMuted:'rgba(255,255,255,0.4)',inputBg:'#1F1F23'}
};

function MonthChart({data,C}){
  const ref=useRef(null);
  const chartRef=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    if(chartRef.current)chartRef.current.destroy();
    chartRef.current=new Chart(ref.current,{
      type:'bar',
      data:{
        labels:data.map(d=>d.label||d.id),
        datasets:[
          {label:'Indtægter',data:data.map(d=>d.income),backgroundColor:C.green,borderRadius:3,barPercentage:0.8,categoryPercentage:0.7},
          {label:'Udgifter',data:data.map(d=>d.expense),backgroundColor:C.red,borderRadius:3,barPercentage:0.8,categoryPercentage:0.7},
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},
          tooltip:{backgroundColor:C.card,titleColor:C.text,bodyColor:C.text,borderColor:C.border,borderWidth:1,padding:10,
            titleFont:{family:"'DM Sans'",size:12,weight:'600'},bodyFont:{family:"'DM Sans'",size:12},
            callbacks:{label:ctx=>ctx.dataset.label+': '+fmt(ctx.parsed.y)}}},
        scales:{x:{ticks:{font:{size:10,family:"'DM Sans'"},color:C.muted,autoSkip:false},grid:{display:false},border:{display:false}},
                y:{ticks:{font:{size:10,family:"'DM Sans'"},color:C.muted,callback:v=>(v/1000).toFixed(0)+'k'},grid:{color:C.border},border:{display:false}}}
      }
    });
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[data,C]);
  return React.createElement('div',{style:{position:'relative',height:200,width:'100%'}},
    React.createElement('canvas',{ref}));
}

function CategoryTrend({months,values,C}){
  const ref=useRef(null);
  const chartRef=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    if(chartRef.current)chartRef.current.destroy();
    chartRef.current=new Chart(ref.current,{
      type:'line',
      data:{labels:months,datasets:[{data:values,borderColor:C.blue,backgroundColor:C.bbg,fill:true,tension:0.3,pointRadius:3,pointBackgroundColor:C.blue,borderWidth:2}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},
          tooltip:{backgroundColor:C.card,titleColor:C.text,bodyColor:C.text,borderColor:C.border,borderWidth:1,padding:8,
            titleFont:{size:11},bodyFont:{size:12},callbacks:{label:ctx=>fmt(ctx.parsed.y)}}},
        scales:{x:{ticks:{font:{size:10,family:"'DM Sans'"},color:C.muted},grid:{display:false},border:{display:false}},
                y:{ticks:{font:{size:10,family:"'DM Sans'"},color:C.muted,callback:v=>(v/1000).toFixed(1)+'k'},grid:{color:C.border},border:{display:false}}}
      }
    });
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[months,values,C]);
  return React.createElement('div',{style:{position:'relative',height:140,width:'100%'}},
    React.createElement('canvas',{ref}));
}

function App(){
  const [tab,setTab]=useState('overblik');
  const [bal,setBal]=useState(()=>ls.get('fin-bal')||{lon:0,ops:0});
  const [txs,setTxs]=useState(()=>ls.get('fin-txs')||[]);
  const [budgets,setBudgets]=useState(()=>ls.get('fin-budgets')||{});
  const [goals,setGoals]=useState(()=>ls.get('fin-goals')||[]);
  const [fixed,setFixed]=useState(()=>ls.get('fin-fixed')||[
    {id:1,name:'IF Skadeforsikring',amount:285,cat:'Forsikring'},
    {id:2,name:'Spotify',amount:119,cat:'Streaming'},
    {id:3,name:'ChatGPT Plus',amount:173,cat:'Software abonnementer'},
    {id:4,name:'Apple iCloud',amount:25,cat:'Streaming'},
  ]);
  const [templates,setTemplates]=useState(()=>ls.get('fin-templates')||[
    {id:1,name:'Netto',amount:200,cat:'Dagligvarer',desc:'Netto dagligvarer'},
    {id:2,name:'Tankning OK',amount:400,cat:'Benzin / bil',desc:'OK tankning'},
    {id:3,name:'Frokost',amount:75,cat:'Restauranter & café',desc:'Frokost ude'},
  ]);
  const [dark,setDark]=useState(()=>ls.get('fin-dark')||false);
  const [expectedSalary,setExpectedSalary]=useState(()=>{
    const stored=ls.get('fin-salary');
    if(stored)return stored;
    // Default: 15.000 kr - juster i indstillinger
    return 15000;
  });
  const [tmpSalary,setTmpSalary]=useState('');

  const [editBal,setEditBal]=useState(false);
  const [tmpLon,setTmpLon]=useState('');
  const [tmpOps,setTmpOps]=useState('');
  const [form,setForm]=useState({date:todayISO(),amount:'',desc:'',cat:'Dagligvarer',type:'expense',udlaeg:'',linkedCat:''});
  const [saved,setSaved]=useState(false);
  const [filterCat,setFilterCat]=useState('');
  const [filterMonth,setFilterMonth]=useState('');
  const [search,setSearch]=useState('');
  const [trendCat,setTrendCat]=useState(null);
  const [pasteText,setPasteText]=useState('');
  const [importMsg,setImportMsg]=useState(null);
  const [importPreview,setImportPreview]=useState(null);
  const [newGoal,setNewGoal]=useState({name:'',target:''});
  const [newFixed,setNewFixed]=useState({name:'',amount:'',cat:'Dagligvarer'});
  const [newTemplate,setNewTemplate]=useState({name:'',amount:'',cat:'Dagligvarer',desc:''});

  const C=dark?THEMES.dark:THEMES.light;

  useEffect(()=>ls.set('fin-bal',bal),[bal]);
  useEffect(()=>ls.set('fin-txs',txs),[txs]);
  useEffect(()=>ls.set('fin-budgets',budgets),[budgets]);
  useEffect(()=>ls.set('fin-goals',goals),[goals]);
  useEffect(()=>ls.set('fin-fixed',fixed),[fixed]);
  useEffect(()=>ls.set('fin-templates',templates),[templates]);
  useEffect(()=>ls.set('fin-salary',expectedSalary),[expectedSalary]);
  useEffect(()=>{ls.set('fin-dark',dark);document.body.style.background=C.bg;document.body.style.color=C.text;},[dark,C]);

  useEffect(()=>{
    if(form.desc.length>2 && form.type==='expense'){
      const guess=autoCategory(form.desc);
      if(guess&&!INCOME_CATS.has(guess)&&!NEUTRAL_CATS.has(guess)&&form.cat!==guess)setForm(f=>({...f,cat:guess}));
    }
  },[form.desc,form.type]);

  function setFormType(type){
    const newCat=type==='income'?INC_CATS_LIST[0]:type==='neutral'?NEUTRAL_CATS_LIST[0]:'Dagligvarer';
    setForm(f=>({...f,type,cat:newCat,udlaeg:'',linkedCat:''}));
  }

  function saveBal(){
    setBal({lon:parseFloat(tmpLon)||bal.lon,ops:parseFloat(tmpOps)||bal.ops});setEditBal(false);
  }
  // Anvend effekt af en transaktion på saldi (factor=1 for tilføj, -1 for fjern)
  function applyBalDelta(tx,factor=1){
    setBal(b=>{
      let dlon=0,dops=0;
      if(tx.cat==='Opsparing'){
        // Flyt fra lønkonto til opsparing; amount er negativt
        dlon=tx.amount*factor;
        dops=-tx.amount*factor;
      }else if(tx.cat==='Fra opsparing'){
        // Flyt fra opsparing til lønkonto; amount er positivt
        dlon=tx.amount*factor;
        dops=-tx.amount*factor;
      }else{
        // Almindelig udgift, indtægt eller refusion: kun lønkonto
        dlon=tx.amount*factor;
      }
      return{
        lon:Math.round((b.lon+dlon)*100)/100,
        ops:Math.round((b.ops+dops)*100)/100,
      };
    });
  }
  function submitForm(){
    if(!form.date||!form.amount||!form.desc)return;
    const raw=parseFloat(form.amount.replace(',','.'));
    if(isNaN(raw))return;
    const isInc=INCOME_CATS.has(form.cat);
    const amount=isInc||form.cat==='Fra opsparing'?Math.abs(raw):-Math.abs(raw);
    const udlaeg=form.type==='expense'&&form.udlaeg?Math.min(Math.abs(raw),Math.abs(parseFloat(form.udlaeg.replace(',','.'))||0)):0;
    const tx={id:Date.now(),date:form.date,amount,desc:form.desc,cat:form.cat};
    if(udlaeg>0)tx.udlaeg=udlaeg;
    if(form.cat==='Refusion modtaget'&&form.linkedCat)tx.linkedCat=form.linkedCat;
    setTxs([tx,...txs]);
    applyBalDelta(tx,1);
    setForm({...form,amount:'',desc:'',udlaeg:'',linkedCat:''});
    setSaved(true);setTimeout(()=>setSaved(false),2200);
  }
  function applyTemplate(t){
    const isInc=INCOME_CATS.has(t.cat);
    const isNeu=NEUTRAL_CATS.has(t.cat);
    const type=isInc?'income':isNeu?'neutral':'expense';
    setForm({date:todayISO(),amount:t.amount.toString(),desc:t.desc,cat:t.cat,type,udlaeg:''});
    setTab('tilføj');
  }
  function delTx(id){
    const tx=txs.find(t=>t.id===id);
    if(tx)applyBalDelta(tx,-1);
    setTxs(txs.filter(t=>t.id!==id));
  }
  function triggerFixed(){
    const today=todayISO();
    const newTxs=fixed.map((f,i)=>({id:Date.now()+i,date:today,amount:-Math.abs(f.amount),desc:f.name,cat:f.cat}));
    setTxs([...newTxs,...txs]);
    newTxs.forEach(tx=>applyBalDelta(tx,1));
    setSaved(true);setTimeout(()=>setSaved(false),2200);
  }

  function exportJSON(){
    const data={bal,txs,budgets,goals,fixed,templates,exportDate:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='oekonomi-backup-'+todayISO()+'.json';a.click();
    URL.revokeObjectURL(url);
  }
  function exportCSV(){
    const rows=[['Dato','Beskrivelse','Kategori','Beløb']];
    txs.forEach(t=>rows.push([t.date,t.desc,t.cat,t.amount.toString().replace('.',',')]));
    const csv='\ufeff'+rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(';')).join('\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='transaktioner-'+todayISO()+'.csv';a.click();
    URL.revokeObjectURL(url);
  }
  function importJSON(e){
    const f=e.target.files?.[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.bal)setBal(d.bal);
        if(d.txs)setTxs(d.txs);
        if(d.budgets)setBudgets(d.budgets);
        if(d.goals)setGoals(d.goals);
        if(d.fixed)setFixed(d.fixed);
        if(d.templates)setTemplates(d.templates);
        setImportMsg({ok:true,text:'Backup gendannet ✓'});
        setTimeout(()=>setImportMsg(null),3000);
      }catch{setImportMsg({ok:false,text:'Kunne ikke læse filen'});setTimeout(()=>setImportMsg(null),3000);}
    };
    r.readAsText(f);
    e.target.value='';
  }
  function importCSVFile(e){
    const f=e.target.files?.[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      // Læs filen som tekst (UTF-8 med fallback til latin1 for ældre bank-eksporter)
      let text=ev.target.result;
      // Strip BOM hvis det er der
      if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
      setPasteText(text);
      // Auto-trigger preview efter kort delay så state er opdateret
      setTimeout(()=>{
        if(text.trim()){
          // Brug teksten direkte i stedet for at vente på state
          parseImportText(text);
        }
      },50);
    };
    r.readAsText(f,'UTF-8');
    e.target.value='';
  }
  function parseImport(){parseImportText(pasteText);}
  function parseImportText(text){
    if(!text||!text.trim())return;
    const lines=text.trim().split('\n').filter(l=>l.trim());
    // Detect & skip header line if present
    const hasDateInFirstLine=/\d{4}[\/\-]\d{2}[\/\-]\d{2}/.test(lines[0]);
    const dataLines=hasDateInFirstLine?lines:lines.slice(1);
    const items=[];
    let skipped=0;
    dataLines.forEach((line,i)=>{
      const parts=line.split(/[;\t]|,(?=(?:[^"]*"[^"]*")*[^"]*$)/).map(s=>s.trim().replace(/^"|"$/g,''));
      if(parts.length<3){skipped++;return;}
      let date=null,amount=null;
      const textParts=[];
      for(const p of parts){
        if(!date&&/^\d{4}[\/\-]\d{2}[\/\-]\d{2}$/.test(p))date=p.replace(/\//g,'-');
        else if(amount===null&&/^-?\d{1,3}(\.\d{3})*([.,]\d+)?$/.test(p)&&p.length>0)amount=parseFloat(p.replace(/\./g,'').replace(',','.'));
        else if(amount===null&&/^-?\d+([.,]\d+)?$/.test(p))amount=parseFloat(p.replace(',','.'));
        else if(p&&p.length>1&&!/^\d+$/.test(p))textParts.push(p);
      }
      const desc=textParts.sort((a,b)=>b.length-a.length)[0]||'';
      if(date&&amount!==null&&desc){
        let guess=autoCategory(desc);
        if(amount>0&&guess&&!INCOME_CATS.has(guess)&&!NEUTRAL_CATS.has(guess)){
          guess=guess==='MobilePay sendt'?'MobilePay modtaget':null;
        }
        const cat=guess||(amount>0?'MobilePay modtaget':'Andet');
        const isInc=INCOME_CATS.has(cat);
        const isNeu=NEUTRAL_CATS.has(cat);
        const type=isInc?'income':isNeu?'neutral':'expense';
        // Tjek for dublet i eksisterende transaktioner (samme dato+beløb+beskrivelse)
        const isDuplicate=txs.some(t=>
          t.date===date&&
          Math.abs(Math.abs(t.amount)-Math.abs(amount))<0.01&&
          t.desc.trim().toLowerCase()===desc.trim().toLowerCase()
        );
        items.push({tmpId:Date.now()+i,date,amount,desc,cat,type,udlaeg:'',linkedCat:'',included:!isDuplicate,isDuplicate});
      }else skipped++;
    });
    if(items.length>0){
      setImportPreview({items,skipped});
    }else{
      setImportMsg({ok:false,text:'Ingen gyldige transaktioner fundet. Format: dato;beløb;beskrivelse'});
      setTimeout(()=>setImportMsg(null),4000);
    }
  }
  function updatePreviewItem(idx,changes){
    setImportPreview(p=>({...p,items:p.items.map((it,i)=>i===idx?{...it,...changes}:it)}));
  }
  function setPreviewType(idx,type){
    const it=importPreview.items[idx];
    let newCat=it.cat;
    if(type==='income'&&!INCOME_CATS.has(it.cat))newCat=it.amount>0?'MobilePay modtaget':INC_CATS_LIST[0];
    if(type==='neutral'&&!NEUTRAL_CATS.has(it.cat))newCat='Refusion modtaget';
    if(type==='expense'&&(INCOME_CATS.has(it.cat)||NEUTRAL_CATS.has(it.cat)))newCat=autoCategory(it.desc)||'Andet';
    updatePreviewItem(idx,{type,cat:newCat,udlaeg:type==='expense'?it.udlaeg:''});
  }
  function bulkMarkIncomingAsRefusion(){
    setImportPreview(p=>({...p,items:p.items.map(it=>
      it.amount>0&&it.type==='income'?{...it,type:'neutral',cat:'Refusion modtaget'}:it)}));
  }
  function bulkToggleDuplicates(includeAll){
    setImportPreview(p=>({...p,items:p.items.map(it=>
      it.isDuplicate?{...it,included:includeAll}:it)}));
  }
  function confirmImport(){
    if(!importPreview)return;
    const newTxs=importPreview.items.filter(it=>it.included).map(it=>{
      let amt=it.amount;

              React.createElement('span',{style:{fontSize:12,color:C.muted,alignSelf:'center'}},'eller indsæt rækker manuelt nedenfor:')
            ),
            React.createElement('textarea',{value:pasteText,onChange:e=>setPasteText(e.target.value),
              placeholder:'2026/05/12;-250,00;Netto\n2026/05/13;-99,00;Spotify\n2026/05/14;200,00;MobilePay fra kæreste',
              rows:5,style:{...inp,fontFamily:'monospace',fontSize:12,resize:'vertical',minHeight:90}}),
            React.createElement('button',{onClick:parseImport,style:{...btnPrim,marginTop:10}},'Forhåndsvis →')
          ),
          importPreview && (function(){
            const items=importPreview.items;
            const includedCount=items.filter(it=>it.included).length;
            const dupCount=items.filter(it=>it.isDuplicate).length;
            const dupIncluded=items.filter(it=>it.isDuplicate&&it.included).length;
            const incomingMP=items.filter(it=>it.amount>0&&it.type==='income'&&(it.desc.toLowerCase().includes('mobilepay')||it.cat==='MobilePay modtaget')).length;
            const totalInc=items.filter(it=>it.included&&it.type==='income').reduce((s,it)=>s+Math.abs(it.amount),0);
            const totalExp=items.filter(it=>it.included&&it.type==='expense').reduce((s,it)=>s+(Math.abs(it.amount)-(parseFloat(it.udlaeg)||0)),0);
            const totalNeu=items.filter(it=>it.included&&it.type==='neutral').length;
            return React.createElement('div',null,
              React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,flexWrap:'wrap',gap:8}},
                React.createElement('div',{style:{fontSize:13,fontWeight:600}},'Forhåndsvisning: '+includedCount+' transaktioner'+(dupCount>0?' ('+dupCount+' dubletter fundet)':'')),
                React.createElement('div',{style:{display:'flex',gap:6}},
                  React.createElement('button',{onClick:cancelImport,style:btnSec},'Annuller'),
                  React.createElement('button',{onClick:confirmImport,style:btnPrim},'✓ Importér '+includedCount))
              ),
              // Summary stats
              React.createElement('div',{style:{display:'flex',gap:8,fontSize:11,marginBottom:10,flexWrap:'wrap'}},
                React.createElement('span',{style:{padding:'4px 10px',background:C.gbg,color:C.green,borderRadius:14,fontWeight:500}},'↑ '+fmt(totalInc)+' indt.'),
                React.createElement('span',{style:{padding:'4px 10px',background:C.rbg,color:C.red,borderRadius:14,fontWeight:500}},'↓ '+fmt(totalExp)+' udg.'),
                totalNeu>0 && React.createElement('span',{style:{padding:'4px 10px',background:C.abg,color:C.amber,borderRadius:14,fontWeight:500}},'↔ '+totalNeu+' neutrale')
              ),
              // Duplicate alert
              dupCount>0 && React.createElement('div',{style:{padding:'9px 12px',background:C.abg,borderRadius:8,fontSize:12,marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,flexWrap:'wrap'}},
                React.createElement('span',{style:{color:C.amber}},'🔁 '+dupCount+' dublet'+(dupCount===1?'':'ter')+' fundet i dine eksisterende transaktioner — '+(dupIncluded===0?'ekskluderet automatisk':dupIncluded+' inkluderet')),
                React.createElement('div',{style:{display:'flex',gap:6}},
                  dupIncluded>0 && React.createElement('button',{onClick:()=>bulkToggleDuplicates(false),style:{...btnSec,fontSize:11,padding:'5px 10px',color:C.amber,borderColor:C.amber}},'Ekskludér alle'),
                  dupIncluded<dupCount && React.createElement('button',{onClick:()=>bulkToggleDuplicates(true),style:{...btnSec,fontSize:11,padding:'5px 10px',color:C.amber,borderColor:C.amber}},'Inkludér alle alligevel'))
              ),
              // Bulk MobilePay refusion
              incomingMP>0 && React.createElement('div',{style:{padding:'9px 12px',background:C.bbg,borderRadius:8,fontSize:12,marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,flexWrap:'wrap'}},
                React.createElement('span',{style:{color:C.blue}},'💡 '+incomingMP+' indkomne MobilePay – er nogle refusioner fra venner/familie?'),
                React.createElement('button',{onClick:bulkMarkIncomingAsRefusion,style:{...btnSec,fontSize:11,padding:'5px 10px',color:C.blue,borderColor:C.blue}},'Marker alle som refusion')
              ),
              React.createElement('div',{style:{fontSize:11,color:C.muted,marginBottom:8}},
                '👇 Tjek hver række. Klik på ↓↑↔ for at skifte type. Tilføj udlæg på delte regninger. Slet linjer du ikke vil importere. ',
                React.createElement('b',null,'NB:'),' Lønkonto-saldoen opdateres automatisk efter import — juster den manuelt bagefter hvis nødvendigt.'),
              // Item list
              React.createElement('div',{style:{maxHeight:400,overflowY:'auto',border:'1px solid '+C.border,borderRadius:8,padding:6}},
                items.map((it,idx)=>React.createElement('div',{key:idx,style:{padding:'8px 10px',borderRadius:6,marginBottom:4,background:it.included?(it.isDuplicate?C.abg:C.bg):'transparent',opacity:it.included?1:0.4,border:it.isDuplicate?'1px solid '+C.amber:'none'}},
                  // Top line: date, desc, amount, delete
                  React.createElement('div',{style:{display:'flex',gap:8,alignItems:'center',marginBottom:6,fontSize:12,flexWrap:'wrap'}},
                    React.createElement('span',{style:{color:C.muted,fontFamily:'monospace',fontSize:11,minWidth:65}},danishDate(it.date)),
                    React.createElement('span',{style:{flex:1,minWidth:120,fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},it.desc),
                    it.isDuplicate && React.createElement('span',{title:'Findes allerede med samme dato, beløb og beskrivelse',style:{padding:'2px 7px',background:C.amber,color:'#fff',fontSize:10,borderRadius:10,fontWeight:600,whiteSpace:'nowrap'}},'🔁 Dublet'),
                    React.createElement('span',{style:{fontWeight:600,color:it.type==='neutral'?C.amber:it.amount>=0?C.green:C.red,minWidth:70,textAlign:'right'}},(it.amount>=0?'+':'')+fmt(it.amount)),
                    React.createElement('button',{onClick:()=>updatePreviewItem(idx,{included:!it.included}),style:{...btnSec,padding:'3px 8px',fontSize:10,minWidth:55}},it.included?'✕ Skip':'+ Inkl')
                  ),
                  // Bottom line: type toggle, category, udlæg / linkedCat
                  it.included && React.createElement('div',{style:{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}},
                    React.createElement('div',{style:{display:'flex',gap:2,padding:2,background:C.card,borderRadius:6}},
                      ...[
                        {id:'expense',icon:'↓',c:C.red},
                        {id:'income',icon:'↑',c:C.green},
                        {id:'neutral',icon:'↔',c:C.amber},
                      ].map(t=>React.createElement('button',{key:t.id,onClick:()=>setPreviewType(idx,t.id),
                        title:t.id,
                        style:{padding:'3px 8px',borderRadius:4,border:'none',cursor:'pointer',fontSize:11,fontWeight:600,
                          background:it.type===t.id?t.c:'transparent',color:it.type===t.id?'#fff':C.muted}},t.icon))
                    ),
                    React.createElement('select',{value:it.cat,onChange:e=>updatePreviewItem(idx,{cat:e.target.value,linkedCat:''}),
                      style:{...inp,padding:'4px 8px',fontSize:11,width:'auto',flex:1,minWidth:120}},
                      (it.type==='income'?INC_CATS_LIST:it.type==='neutral'?NEUTRAL_CATS_LIST:EXP_CATS).map(c=>React.createElement('option',{key:c,value:c},c))),
                    it.type==='expense' && React.createElement('input',{type:'text',value:it.udlaeg,onChange:e=>updatePreviewItem(idx,{udlaeg:e.target.value}),
                      placeholder:'🤝 udlæg',
                      style:{...inp,padding:'4px 8px',fontSize:11,width:80}}),
                    it.cat==='Refusion modtaget' && React.createElement('select',{value:it.linkedCat||'',onChange:e=>updatePreviewItem(idx,{linkedCat:e.target.value}),
                      title:'Reducerer udgifter i denne kategori',
                      style:{...inp,padding:'4px 8px',fontSize:11,width:'auto',minWidth:130}},
                      React.createElement('option',{value:''},'↓ generelt'),
                      EXP_CATS.map(c=>React.createElement('option',{key:c,value:c},'↓ '+c)))
                  )
                ))
              )
            );
          })()
        ),

        React.createElement('div',{style:{...card}},
          React.createElement('div',{style:secTitle},'📅 Faste månedlige udgifter'),
          fixed.map(f=>React.createElement('div',{key:f.id,style:{display:'flex',gap:8,alignItems:'center',padding:'8px 10px',background:C.bg,borderRadius:8,marginBottom:6}},
            React.createElement('div',{style:{flex:1,fontSize:13}},
              React.createElement('div',{style:{fontWeight:500}},f.name),
              React.createElement('div',{style:{fontSize:11,color:C.muted}},f.cat)),
            React.createElement('div',{style:{fontSize:13,fontWeight:500,color:C.red}},fmt(f.amount)),
            React.createElement('button',{onClick:()=>setFixed(fixed.filter(x=>x.id!==f.id)),style:{...btnSec,padding:'4px 8px',fontSize:11}},'Slet'))),
          React.createElement('div',{style:{borderTop:'1px solid '+C.border,paddingTop:12,marginTop:8}},
            React.createElement('div',{style:{display:'flex',gap:6,flexWrap:'wrap'}},
              React.createElement('input',{value:newFixed.name,onChange:e=>setNewFixed({...newFixed,name:e.target.value}),placeholder:'Navn',style:{...inp,flex:1,minWidth:120}}),
              React.createElement('input',{value:newFixed.amount,onChange:e=>setNewFixed({...newFixed,amount:e.target.value}),placeholder:'Beløb',type:'number',style:{...inp,width:90}}),
              React.createElement('select',{value:newFixed.cat,onChange:e=>setNewFixed({...newFixed,cat:e.target.value}),style:{...inp,width:140}},
                EXP_CATS.map(c=>React.createElement('option',{key:c,value:c},c))),
              React.createElement('button',{onClick:()=>{
                if(!newFixed.name||!newFixed.amount)return;
                setFixed([...fixed,{id:Date.now(),name:newFixed.name,amount:parseFloat(newFixed.amount),cat:newFixed.cat}]);
                setNewFixed({name:'',amount:'',cat:'Dagligvarer'});
              },style:btnPrim},'+'))
          )
        ),

        React.createElement('div',{style:{...card}},
          React.createElement('div',{style:secTitle},'⚡ Hurtig-tilføj skabeloner'),
          templates.map(t=>React.createElement('div',{key:t.id,style:{display:'flex',gap:8,alignItems:'center',padding:'8px 10px',background:C.bg,borderRadius:8,marginBottom:6}},
            React.createElement('div',{style:{flex:1,fontSize:13}},
              React.createElement('div',{style:{fontWeight:500}},t.name),
              React.createElement('div',{style:{fontSize:11,color:C.muted}},t.desc+' · '+t.cat)),
            React.createElement('div',{style:{fontSize:13,fontWeight:500}},fmt(t.amount)),
            React.createElement('button',{onClick:()=>setTemplates(templates.filter(x=>x.id!==t.id)),style:{...btnSec,padding:'4px 8px',fontSize:11}},'Slet'))),
          React.createElement('div',{style:{borderTop:'1px solid '+C.border,paddingTop:12,marginTop:8}},
            React.createElement('div',{style:{display:'flex',gap:6,flexWrap:'wrap'}},
              React.createElement('input',{value:newTemplate.name,onChange:e=>setNewTemplate({...newTemplate,name:e.target.value}),placeholder:'Knap-navn',style:{...inp,flex:1,minWidth:100}}),
              React.createElement('input',{value:newTemplate.desc,onChange:e=>setNewTemplate({...newTemplate,desc:e.target.value}),placeholder:'Beskrivelse',style:{...inp,flex:1,minWidth:120}}),
              React.createElement('input',{value:newTemplate.amount,onChange:e=>setNewTemplate({...newTemplate,amount:e.target.value}),placeholder:'Beløb',type:'number',style:{...inp,width:80}}),
              React.createElement('select',{value:newTemplate.cat,onChange:e=>setNewTemplate({...newTemplate,cat:e.target.value}),style:{...inp,width:140}},
                ALL_CATS.map(c=>React.createElement('option',{key:c,value:c},c))),
              React.createElement('button',{onClick:()=>{
                if(!newTemplate.name||!newTemplate.amount||!newTemplate.desc)return;
                setTemplates([...templates,{id:Date.now(),...newTemplate,amount:parseFloat(newTemplate.amount)}]);
                setNewTemplate({name:'',amount:'',cat:'Dagligvarer',desc:''});
              },style:btnPrim},'+'))
          )
        ),

        React.createElement('div',{style:{...card}},
          React.createElement('div',{style:secTitle},'⚠ Fareland'),
          React.createElement('button',{onClick:resetAll,style:{...btnPrim,background:C.red,color:'#fff'}},'Nulstil alle data')
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

// Registrér service worker for PWA-funktionalitet (offline + installerbar)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW registration failed:', err));
  });
}
</script>
</body>
</html>
